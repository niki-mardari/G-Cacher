services:
  db:
    image: postgres:16
    container_name: satcache_db
    environment:
      POSTGRES_DB: satcache_db
      POSTGRES_USER: satcache_user
      POSTGRES_PASSWORD: satcache_password
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - satcache_postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satcache_user -d satcache_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: satcache_backend
    environment:
      DATABASE_URL: postgresql://satcache_user:satcache_password@db:5432/satcache_db
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    build:
      context: ./frontend
    container_name: satcache_frontend
    ports:
      - "0.0.0.0:3000:80"
    depends_on:
      - backend

volumes:
  satcache_postgres_data:
