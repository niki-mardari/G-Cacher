<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SatCache — 3D Route View</title>
  <link rel="stylesheet" href="css/terrain.css" />
</head>
<body>
  <div id="app"></div>
  <aside class="console">
    <div class="brand"><b>SatCache 3D</b><span>GNSS route viewer</span></div>
    <p class="sub">Fetches /api/track and renders longitude/latitude/altitude as a simple 3D route.</p>
    <button id="refreshBtn">Refresh route</button>
    <a class="link" href="index.html">Back to dashboard</a>
    <div class="stats" id="stats">Waiting for track...</div>
  </aside>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/terrain.js"></script>
</body>
</html>
